<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des utilisateurs</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Gestion des utilisateurs</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeUtilisateur.html">Voir la liste complète</a>
                <a class="btn-link" href="/indexCategorie.html" id="CategorieBouton">Voir les categories</a>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter un utilisateur</h2>
        <form id="formAjout">
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="text" id="prenom" placeholder="Prenom" required>
            <input type="email" id="courriel" placeholder="Courriel" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des utilisateurs</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prenom</th>
                    <th>Courriel</th>
                </tr>
            </thead>
            <tbody id="tbodyUtilisateurs"></tbody>
        </table>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/indexUtilisateur.js"></script>
</body>
</html>
