 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier une categorie</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="topbar">
            <div>
                <h1>Modifier une categorie</h1>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeCategorie.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <form id="formEdit">
            <input type="text" id="id_categorie" placeholder="id" required>
            <input type="text" id="nom_categorie" placeholder="Nom" required>
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editCategorie.js"></script>
</body>
</html>
